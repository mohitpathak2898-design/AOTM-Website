<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOTM Website</title>
    <style>
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

     
        html {
            overflow-y: scroll; 
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
            min-height: 150vh; 
        }

     

        .container {
            max-width: 1400px; 
            margin: 0 auto;
            padding: 0 40px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

      
        .navbar {
            background: #ffffff;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo a {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d32f2f; 
            cursor: default;
        }

        .nav-menu {
            display: flex;
            list-style: none;
        }

        .nav-menu li {
            margin-left: 2rem;
        }

        .nav-menu a {
            font-weight: 500;
            color: #333;
            outline: none;
            padding: 5px 10px;
            transition: color 0.2s ease;
        }

        
        .nav-menu a:hover, 
        .nav-menu a:active, 
        .nav-menu a:focus,
        .nav-menu a.active {
            color: #d32f2f;
        }

        
        #nav-toggle {
            display: none;
        }

        .nav-toggle-label {
            display: none;
            cursor: pointer;
            padding: 5px;
        }

        .nav-toggle-label span,
        .nav-toggle-label span::before,
        .nav-toggle-label span::after {
            display: block;
            background: #333;
            height: 3px;
            width: 25px;
            position: relative;
        }

        .nav-toggle-label span::before { content: ""; position: absolute; top: -8px; }
        .nav-toggle-label span::after { content: ""; position: absolute; top: 8px; }

        
        .hero {
            background: #222;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://via.placeholder.com/1500x800');
            background-size: cover;
            background-position: center;
            height: 60vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 3.5rem;
        }

        .main-content {
            padding: 100px 0;
            text-align: center;
        }

       
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .nav-toggle-label {
                display: block;
            }

            .nav-menu {
                display: none; 
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #ffffff;
                flex-direction: column;
                padding: 0;
                border-bottom: 2px solid #ccc;
            }

            .nav-menu a {
                display: block;
                padding: 15px 25px;
                border-bottom: 1px solid #eee;
            }

            #nav-toggle:checked ~ .nav-menu {
                display: flex;
            }

            #nav-toggle:checked ~ .nav-toggle-label span { background: transparent; }
            #nav-toggle:checked ~ .nav-toggle-label span::before { transform: rotate(45deg); top: 0; }
            #nav-toggle:checked ~ .nav-toggle-label span::after { transform: rotate(-45deg); top: 0; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-flex">
            <div class="logo">
                <a>ARENA GTB NAGAR</a>
            </div>
            
            <input type="checkbox" id="nav-toggle">
            
            <label for="nav-toggle" class="nav-toggle-label">
                <span></span>
            </label>

            <ul class="nav-menu">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>This Website is in Development...</h1>
            <p style="margin-top: 20px;"></p>
        </div>
    </header>

    <section class="main-content">
        <div class="container">
            <h2></h2>
            <div style="height: 1000px;"></div> </div>
    </section>

</body>
</html>
