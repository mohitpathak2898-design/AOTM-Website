<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOTM Website</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            overflow-y: scroll; 
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }

        .container {
            max-width: 1300px; 
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

       
        .navbar {
            background: #ffffff;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
        }

        .nav-flex {
            display: flex;
            justify-content: space-between; 
            align-items: center;
        }

        .logo {
            flex: 1;
            text-align: left;
        }

        .logo a {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d32f2f; 
            cursor: default;
            white-space: nowrap;
        }

       
        .nav-menu {
            display: flex;
            list-style: none;
            justify-content: flex-end; 
        }

        .nav-menu li {
            margin-left: 2.5rem; 
        }

        .nav-menu a {
            font-weight: 500;
            color: #333;
            outline: none;
            padding: 5px 0; 
            transition: color 0.2s ease;
            white-space: nowrap;
        }

        .nav-menu a:hover, 
        .nav-menu a:active, 
        .nav-menu a:focus,
        .nav-menu a.active {
            color: #d32f2f;
        }

        
        #check-menu {
            display: none; 
        }

        .dropdown-btn {
            display: none; 
            cursor: pointer;
            padding: 5px;
        }

       
        .dropdown-btn span,
        .dropdown-btn span::before,
        .dropdown-btn span::after {
            display: block;
            background: #333;
            height: 3px;
            width: 25px;
            position: relative;
        }

        .dropdown-btn span::before { content: ""; position: absolute; top: -8px; }
        .dropdown-btn span::after { content: ""; position: absolute; top: 8px; }

       
        .hero {
            background: #222;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://via.placeholder.com/1500x800');
            background-size: cover;
            background-position: center;
            height: 60vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 3.5rem;
        }

        .main-content {
            padding: 100px 0;
            text-align: center;
        }

       
        @media (max-width: 768px) {
            .dropdown-btn {
                display: block; 
            }

            .nav-menu {
                display: none; 
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #ffffff;
                flex-direction: column;
                padding: 0;
                border-bottom: 2px solid #ccc;
                text-align: center; 
            }

            .nav-menu li {
                margin-left: 0;
            }

            .nav-menu a {
                display: block;
                padding: 15px 25px;
                border-bottom: 1px solid #eee;
            }

          
            #check-menu:checked ~ .nav-menu {
                display: flex;
            }

           
            #check-menu:checked ~ .dropdown-btn span { background: transparent; }
            #check-menu:checked ~ .dropdown-btn span::before { transform: rotate(45deg); top: 0; }
            #check-menu:checked ~ .dropdown-btn span::after { transform: rotate(-45deg); top: 0; }

            .hero h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-flex">
            <div class="logo">
                <a>ARENA GTB NAGAR</a>
            </div>
            
            <input type="checkbox" id="check-menu">
            
            <label for="check-menu" class="dropdown-btn">
                <span></span>
            </label>

            <ul class="nav-menu">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>This Website is in Development...</h1>
        </div>
    </header>

    <section class="main-content">
        <div class="container">
            <div style="height: 600px;"></div> 
        </div>
    </section>

</body>
</html>
